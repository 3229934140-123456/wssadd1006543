<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洁牙抛光套餐收银工作台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a6fb5;--primary-light:#e8f4fd;--primary-dark:#145a94;
  --success:#2e9e5a;--success-light:#eaf7ef;--warning:#e6a23c;--warning-light:#fdf6ec;
  --danger:#e74c3c;--danger-light:#fef0ef;
  --bg:#f0f2f5;--card:#fff;--border:#e4e7ed;--text:#303133;--text-secondary:#909399;--text-light:#c0c4cc;
  --radius:8px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(26,111,181,.3)}
.header h1{font-size:18px;font-weight:600;letter-spacing:1px}
.header-nav{display:flex;gap:4px}
.header-nav button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:13px;transition:all .2s}
.header-nav button:hover,.header-nav button.active{background:rgba(255,255,255,.3)}
.page{display:none;padding:20px 24px;max-width:1200px;margin:0 auto}
.page.active{display:block}

.patient-bar{background:var(--card);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.patient-bar label{font-weight:600;color:var(--primary);white-space:nowrap;font-size:15px}
.search-box{position:relative;flex:1;min-width:220px}
.search-box input{width:100%;padding:8px 12px 8px 36px;border:2px solid var(--border);border-radius:6px;font-size:14px;transition:border-color .2s;outline:none}
.search-box input:focus{border-color:var(--primary)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-secondary)}
.patient-info{display:flex;gap:16px;align-items:center;font-size:13px;color:var(--text-secondary)}
.patient-info .tag{background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:4px;font-size:12px}

.section-title{font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::before{content:"";display:inline-block;width:4px;height:18px;background:var(--primary);border-radius:2px}

.package-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:20px}
.pkg-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.pkg-card:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(26,111,181,.12);transform:translateY(-2px)}
.pkg-card.selected{border-color:var(--primary);background:var(--primary-light)}
.pkg-card.selected::after{content:"✓";position:absolute;top:8px;right:8px;width:24px;height:24px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold}
.pkg-name{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--text)}
.pkg-items{font-size:12px;color:var(--text-secondary);margin-bottom:10px;line-height:1.8}
.pkg-items span{display:inline-block;background:#f5f7fa;padding:1px 6px;border-radius:3px;margin:2px 4px 2px 0}
.pkg-price-row{display:flex;align-items:baseline;gap:8px}
.pkg-price{font-size:22px;font-weight:700;color:var(--danger)}
.pkg-price .yen{font-size:14px}
.pkg-original{font-size:13px;color:var(--text-light);text-decoration:line-through}
.pkg-target{font-size:12px;color:var(--success);margin-top:6px;background:var(--success-light);display:inline-block;padding:1px 8px;border-radius:3px}

.order-panel{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:20px}
.order-panel table{width:100%;border-collapse:collapse;margin-bottom:12px}
.order-panel th{text-align:left;font-weight:600;color:var(--text-secondary);font-size:13px;padding:8px 12px;border-bottom:2px solid var(--border)}
.order-panel td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px}
.order-panel tr:last-child td{border-bottom:none}
.order-panel .addon-row{background:var(--warning-light)}
.item-name{font-weight:500}
.item-tag{font-size:11px;padding:1px 6px;border-radius:3px;margin-left:6px}
.item-tag.pkg{background:var(--primary-light);color:var(--primary)}
.item-tag.addon{background:var(--warning-light);color:var(--warning)}
.price-col{text-align:right;font-weight:600}
.original-price{text-decoration:line-through;color:var(--text-light);font-size:12px;margin-right:6px;font-weight:400}

.order-summary{display:flex;justify-content:flex-end;align-items:baseline;gap:16px;padding-top:12px;border-top:2px solid var(--border)}
.total-label{font-size:14px;color:var(--text-secondary)}
.total-amount{font-size:26px;font-weight:700;color:var(--danger)}
.total-amount .yen{font-size:16px}
.saved-amount{font-size:12px;color:var(--success)}

.order-actions{display:flex;gap:12px;margin-top:16px;justify-content:flex-end}
.btn{padding:10px 24px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-primary:disabled{background:#a0c8e8;cursor:not-allowed}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#268a4d}
.btn-warning{background:var(--warning);color:#fff}
.btn-warning:hover{background:#d4942e}
.btn-outline{background:#fff;color:var(--primary);border:2px solid var(--primary)}
.btn-outline:hover{background:var(--primary-light)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-danger:disabled{background:#f0a098;cursor:not-allowed}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:12px;width:520px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.2);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

.addon-item{display:flex;align-items:center;padding:12px;border:2px solid var(--border);border-radius:8px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.addon-item:hover{border-color:var(--warning)}
.addon-item.checked{border-color:var(--warning);background:var(--warning-light)}
.addon-check{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;margin-right:12px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.addon-item.checked .addon-check{background:var(--warning);border-color:var(--warning);color:#fff}
.addon-info{flex:1}
.addon-name{font-weight:600;font-size:14px}
.addon-desc{font-size:12px;color:var(--text-secondary)}
.addon-price{font-weight:700;font-size:16px;color:var(--danger);white-space:nowrap}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-weight:600;margin-bottom:6px;font-size:13px}
.form-group select,.form-group input{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:6px;font-size:14px;outline:none;transition:border-color .2s}
.form-group select:focus,.form-group input:focus{border-color:var(--primary)}

.confirm-check{display:flex;align-items:center;gap:10px;padding:14px;background:var(--success-light);border-radius:8px;margin-top:14px}
.confirm-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--success)}
.confirm-check label{font-size:13px;font-weight:600;color:var(--success);cursor:pointer}

.sign-area{margin-top:12px;border:2px dashed var(--border);border-radius:8px;height:80px;display:flex;align-items:center;justify-content:center;color:var(--text-light);font-size:13px;cursor:pointer;position:relative;overflow:hidden}
.sign-area.signed{border-color:var(--success);color:var(--success);background:var(--success-light)}
.sign-area canvas{position:absolute;inset:0;width:100%;height:100%}

.payment-methods{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.pay-method{flex:1;min-width:120px;padding:14px;border:2px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;transition:all .2s}
.pay-method:hover{border-color:var(--primary)}
.pay-method.selected{border-color:var(--primary);background:var(--primary-light)}
.pay-method svg{margin-bottom:4px}
.pay-method .method-name{font-weight:600;font-size:14px}
.pay-method .method-desc{font-size:11px;color:var(--text-secondary);margin-top:2px}

.receipt{background:#fffef5;border:1px dashed #d4c89a;border-radius:8px;padding:20px;font-family:"Courier New",monospace;max-width:380px;margin:0 auto}
.receipt-header{text-align:center;border-bottom:1px dashed #d4c89a;padding-bottom:10px;margin-bottom:10px}
.receipt-header h4{font-size:15px;margin-bottom:2px}
.receipt-header p{font-size:11px;color:var(--text-secondary)}
.receipt-line{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.receipt-divider{border:none;border-top:1px dashed #d4c89a;margin:8px 0}
.receipt-section-title{font-weight:700;font-size:12px;margin:6px 0 4px;color:var(--primary)}
.receipt-total{font-size:16px;font-weight:700}
.receipt-footer{text-align:center;font-size:11px;color:var(--text-secondary);margin-top:10px;border-top:1px dashed #d4c89a;padding-top:8px}

.record-table{width:100%;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.record-table table{width:100%;border-collapse:collapse}
.record-table th{background:#f5f7fa;font-weight:600;font-size:13px;padding:12px 16px;text-align:left;color:var(--text-secondary);border-bottom:2px solid var(--border)}
.record-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px}
.record-table tr:hover td{background:#fafbfc}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-success{background:var(--success-light);color:var(--success)}
.badge-warning{background:var(--warning-light);color:var(--warning)}
.badge-primary{background:var(--primary-light);color:var(--primary)}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-state svg{margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}

.insurance-mark{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:10px;background:var(--danger-light);border-radius:6px;font-size:13px}
.insurance-mark label{display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:500;color:var(--danger)}
.insurance-mark input[type=checkbox]{accent-color:var(--danger);width:16px;height:16px}

.search-results{position:absolute;top:100%;left:0;right:0;background:var(--card);border:2px solid var(--border);border-top:none;border-radius:0 0 6px 6px;box-shadow:var(--shadow);z-index:50;max-height:240px;overflow-y:auto;display:none}
.search-results.show{display:block}
.search-result-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.search-result-item:hover{background:var(--primary-light)}
.search-result-item:last-child{border-bottom:none}
.search-result-item .name{font-weight:600}
.search-result-item .phone{color:var(--text-secondary);font-size:12px}
.search-result-item .tag{background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:3px;font-size:11px}
.search-result-new{padding:10px 12px;cursor:pointer;color:var(--primary);border-top:2px dashed var(--border);font-weight:600}
.search-result-new:hover{background:var(--primary-light)}

.patient-display{background:linear-gradient(135deg,var(--primary-light),#fff);border-left:4px solid var(--primary);padding:12px 16px;border-radius:6px;margin-bottom:16px;display:none;align-items:center;justify-content:space-between}
.patient-display.show{display:flex}
.patient-display .patient-main{font-size:15px;font-weight:700;color:var(--text)}
.patient-display .patient-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.patient-display .btn-sm{margin-left:8px}

.filter-bar{background:var(--card);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.filter-bar label{font-weight:600;font-size:13px;color:var(--text-secondary)}
.filter-bar input,.filter-bar select{padding:6px 10px;border:2px solid var(--border);border-radius:6px;font-size:13px;outline:none;min-width:120px}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--primary)}
.filter-bar .btn-sm{padding:6px 16px}

.badge-danger{background:var(--danger-light);color:var(--danger)}
.badge-default{background:#f0f2f5;color:var(--text-secondary)}

.patient-form{display:flex;flex-direction:column;gap:12px}
.patient-form-row{display:flex;gap:12px}
.patient-form-row .form-group{flex:1}

.record-addon-detail{font-size:11px;color:var(--text-secondary);margin-top:2px}

.void-reason{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:6px;font-size:13px;min-height:80px;resize:vertical;outline:none}
.void-reason:focus{border-color:var(--danger)}

.receipt-void-banner{background:var(--danger-light);color:var(--danger);text-align:center;padding:6px;border-radius:4px;font-weight:700;margin-bottom:10px;font-size:13px}

.recon-panel{background:var(--card);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.recon-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.recon-panel-header h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.recon-panel-header h3::before{content:"";display:inline-block;width:4px;height:16px;background:var(--primary);border-radius:2px}
.recon-panel-header .recon-date{font-size:13px;color:var(--text-secondary)}
.recon-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:14px}
.recon-card{padding:14px;border-radius:8px;border:2px solid var(--border);text-align:center;transition:all .2s}
.recon-card:hover{box-shadow:var(--shadow)}
.recon-card .recon-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.recon-card .recon-count{font-size:20px;font-weight:700;color:var(--text)}
.recon-card .recon-amount{font-size:14px;font-weight:600;color:var(--danger);margin-top:2px}
.recon-card .recon-amount .yen{font-size:11px}
.recon-card.cash{border-color:var(--success);background:var(--success-light)}
.recon-card.cash .recon-count{color:var(--success)}
.recon-card.scan{border-color:var(--primary);background:var(--primary-light)}
.recon-card.scan .recon-count{color:var(--primary)}
.recon-card.insurance{border-color:var(--warning);background:var(--warning-light)}
.recon-card.insurance .recon-count{color:var(--warning)}
.recon-net{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:linear-gradient(135deg,var(--primary-light),#fff);border-left:4px solid var(--primary);border-radius:6px}
.recon-net .recon-net-label{font-size:14px;font-weight:600;color:var(--text)}
.recon-net .recon-net-detail{font-size:12px;color:var(--text-secondary);margin-top:2px}
.recon-net .recon-net-amount{font-size:24px;font-weight:700;color:var(--danger)}
.recon-net .recon-net-amount .yen{font-size:14px}

.receipt-print-info{background:#f0f7ff;border:1px dashed var(--primary);border-radius:4px;padding:6px 10px;margin-bottom:10px;font-size:10px;color:var(--primary)}
.receipt-print-info .print-badge{display:inline-block;background:var(--primary);color:#fff;padding:1px 6px;border-radius:3px;font-weight:700;margin-right:4px}

.filter-bar .btn-export{margin-left:auto;padding:6px 14px;font-size:12px;background:var(--success);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.filter-bar .btn-export:hover{background:#268a4d}

@media(max-width:640px){
  .package-grid{grid-template-columns:1fr}
  .payment-methods{flex-direction:column}
  .patient-bar{flex-direction:column;align-items:stretch}
  .filter-bar{flex-direction:column;align-items:stretch}
  .filter-bar input,.filter-bar select{width:100%}
  .recon-cards{grid-template-columns:1fr 1fr}
  .recon-net{flex-direction:column;text-align:center;gap:8px}
}
</style>
</head>
<body>

<header class="header">
  <h1>🦷 洁牙抛光套餐收银台</h1>
  <nav class="header-nav">
    <button class="active" onclick="switchPage('cashier')">套餐收银</button>
    <button onclick="switchPage('records')">收费记录</button>
  </nav>
</header>

<div id="page-cashier" class="page active">
  <div class="patient-bar">
    <label>👤 患者查询</label>
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="patientSearch" placeholder="输入患者姓名或手机号搜索..." oninput="searchPatient(this.value)" onfocus="showSearchResults()">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="patient-info" id="patientInfo" style="display:none">
      <span id="patientName"></span>
      <span id="patientPhone"></span>
      <span class="tag" id="patientTag"></span>
    </div>
  </div>

  <div class="patient-display" id="patientDisplay">
    <div>
      <div class="patient-main" id="patientDisplayName"></div>
      <div class="patient-sub" id="patientDisplaySub"></div>
    </div>
    <button class="btn btn-sm btn-outline" onclick="clearPatient()">切换患者</button>
  </div>

  <div class="section-title">选择洁牙套餐</div>
  <div class="package-grid" id="packageGrid"></div>

  <div id="orderSection" style="display:none">
    <div class="section-title">订单明细</div>
    <div class="order-panel">
      <table>
        <thead>
          <tr><th>项目</th><th style="text-align:right">原价</th><th style="text-align:right">优惠价</th></tr>
        </thead>
        <tbody id="orderItems"></tbody>
      </table>
      <div class="order-summary">
        <span class="total-label">应收金额</span>
        <span class="saved-amount" id="savedAmount"></span>
        <span class="total-amount" id="totalAmount"></span>
      </div>
      <div class="order-actions">
        <button class="btn btn-warning" onclick="openAddonModal()">➕ 加项</button>
        <button class="btn btn-success" onclick="openPaymentModal()">💳 收款</button>
      </div>
    </div>
  </div>
</div>

<div id="page-records" class="page">
  <div class="section-title">收费记录</div>
  <div class="filter-bar">
    <label>患者</label>
    <input type="text" id="filterPatient" placeholder="输入患者姓名..." oninput="applyFilters()">
    <label>手机号</label>
    <input type="text" id="filterPhone" placeholder="输入手机号..." oninput="applyFilters()">
    <label>日期</label>
    <input type="date" id="filterDate" oninput="applyFilters()">
    <label>支付方式</label>
    <select id="filterMethod" onchange="applyFilters()">
      <option value="">全部</option>
      <option value="cash">现金</option>
      <option value="scan">扫码</option>
      <option value="insurance">医保</option>
    </select>
    <label>状态</label>
    <select id="filterStatus" onchange="applyFilters()">
      <option value="">全部</option>
      <option value="normal">正常</option>
      <option value="voided">已作废</option>
      <option value="refunded">已退款</option>
    </select>
    <button class="btn btn-sm btn-outline" onclick="resetFilters()">重置</button>
    <button class="btn-export" onclick="exportRecords()">📥 导出CSV</button>
  </div>
  <div class="recon-panel" id="reconPanel">
    <div class="recon-panel-header">
      <h3>今日对账</h3>
      <span class="recon-date" id="reconDate"></span>
    </div>
    <div class="recon-cards" id="reconCards"></div>
    <div class="recon-net" id="reconNet"></div>
  </div>
  <div class="record-table">
    <table>
      <thead>
        <tr><th>流水号</th><th>患者</th><th>套餐</th><th>金额</th><th>支付方式</th><th>状态</th><th>时间</th><th>操作</th></tr>
      </thead>

<script>
var DOCTOR_NAMES = {

  'dr_zhang': '张医生 - 修复科',
  'dr_chen': '陈医生 - 综合科',
  'dr_liu': '刘医生 - 预防科'
};

var PACKAGES = [
  {
    id: 'basic',
    name: '基础洁牙',
    items: ['超声波洁治', '牙面抛光', '口腔检查'],

  },
  {

    items: ['超声波洁治', '牙面抛光', '喷砂清洁', '牙周冲洗上药', '口腔检查'],
    originalPrice: 480,
    price: 328,
    target: '烟茶渍/色素沉着者',
    color: '#2e9e5a'
  },
  {
    id: 'sandblast',
    name: '喷砂抛光',
    items: ['超声波洁治', '喷砂清洁', '精细抛光', '脱敏处理', '牙周冲洗上药', '口腔检查'],
    originalPrice: 680,
    price: 458,
    target: '重度色素/美白需求者',
    color: '#e6a23c'
  },
  {
    id: 'periodontal',
    name: '牙周维护',
    items: ['龈下刮治', '根面平整', '喷砂抛光', '脱敏处理', '牙周冲洗上药', '口腔检查', '口腔卫生指导'],
    originalPrice: 980,
    price: 688,
    target: '牙周炎患者/复诊维护',
    color: '#e74c3c'
  }
];

var ADDON_ITEMS = [
  { id: 'polish', name: '精细抛光', desc: '特殊抛光膏精细打磨牙面', price: 80 },
  { id: 'desensitize', name: '脱敏处理', desc: '牙本质敏感脱敏涂层', price: 60 },
  { id: 'disposable', name: '一次性耗材包', desc: '一次性口镜/探针/托盘', price: 30 },
  { id: 'fluoride', name: '涂氟保护', desc: '全口涂氟防龋处理', price: 50 }
];

var MOCK_PATIENTS = [
  { name: '张明远', phone: '13812345621', tag: '老客户' },
  { name: '李思涵', phone: '15987658834', tag: '首诊' },
  { name: '王晓峰', phone: '18622332207', tag: '医保' },
  { name: '赵雨桐', phone: '13755664490', tag: '老客户' },
  { name: '陈佳怡', phone: '15288997718', tag: '首诊' }
];

var state = {
  selectedPatient: null,
  selectedPackage: null,
  addons: [],
  addonMeta: {},
  tempAddons: [],
  tempSigned: false,
  payMethod: null,
  signed: false,
  records: JSON.parse(localStorage.getItem('dental_records') || '[]'),
  allPatients: JSON.parse(localStorage.getItem('dental_patients') || '[]').concat(MOCK_PATIENTS)
};

function switchPage(page) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.header-nav button').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');
  if (page === 'records') renderRecords();
}

document.addEventListener('click', function(e) {
  var searchBox = document.querySelector('.search-box');
  var results = document.getElementById('searchResults');
  if (!searchBox.contains(e.target)) {
    results.classList.remove('show');
  }
});

function showSearchResults() {
  var val = document.getElementById('patientSearch').value;
  searchPatient(val);
}

function searchPatient(val) {
  var resultsEl = document.getElementById('searchResults');
  var trimmed = val.trim();

  if (!trimmed) {
    resultsEl.innerHTML = '<div class="search-result-new" onclick="openNewPatientModal()">➕ 新增新患者</div>';
    resultsEl.classList.add('show');
    return;
  }

  var found = state.allPatients.filter(function(p) {
    return p.name.includes(trimmed) || p.phone.includes(trimmed);
  });

  var html = '';
  found.forEach(function(p, idx) {
    html += '<div class="search-result-item" onclick="selectPatient(' + idx + ', \'' + val + '\')">' +
      '<div><div class="name">' + p.name + '</div><div class="phone">' + p.phone.replace(/(\d{3})(\d{4})(\d{4})/, '$1****$3') + '</div></div>' +
      '<span class="tag">' + p.tag + '</span>' +
    '</div>';
  });

  if (trimmed.length >= 2) {
    html += '<div class="search-result-new" onclick="openNewPatientModal()">➕ 新增患者：' + trimmed + '</div>';
  }

  if (!html) {
    html = '<div class="search-result-item" style="color:var(--text-secondary);cursor:default">未找到匹配患者</div>';
    html += '<div class="search-result-new" onclick="openNewPatientModal()">➕ 新增新患者</div>';
  }

  resultsEl.innerHTML = html;
  resultsEl.classList.add('show');
}

function selectPatient(idx, query) {
  var val = document.getElementById('patientSearch').value;
  var trimmed = val.trim();
  var found = state.allPatients.filter(function(p) {
    return p.name.includes(trimmed) || p.phone.includes(trimmed);
  });
  var patient = found[idx];
  state.selectedPatient = patient;

  var info = document.getElementById('patientInfo');
  document.getElementById('patientName').textContent = patient.name;
  document.getElementById('patientPhone').textContent = patient.phone.replace(/(\d{3})(\d{4})(\d{4})/, '$1****$3');
  document.getElementById('patientTag').textContent = patient.tag;
  info.style.display = 'flex';

  var display = document.getElementById('patientDisplay');
  document.getElementById('patientDisplayName').textContent = '👤 ' + patient.name + '  (' + patient.tag + ')';
  document.getElementById('patientDisplaySub').textContent = '手机号：' + patient.phone.replace(/(\d{3})(\d{4})(\d{4})/, '$1****$3');
  display.classList.add('show');

  document.getElementById('patientSearch').value = '';
  document.getElementById('searchResults').classList.remove('show');
  showToast('已选择患者：' + patient.name, 'success');
}

function clearPatient() {
  state.selectedPatient = null;
  document.getElementById('patientInfo').style.display = 'none';
  document.getElementById('patientDisplay').classList.remove('show');
  document.getElementById('patientSearch').value = '';
}

function openNewPatientModal() {
  var query = document.getElementById('patientSearch').value.trim();
  if (query && query.length >= 2 && !/\d/.test(query)) {
    document.getElementById('newPatientName').value = query;
  } else {
    document.getElementById('newPatientName').value = '';
  }
  document.getElementById('newPatientPhone').value = '';
  document.getElementById('searchResults').classList.remove('show');
  openModal('newPatientModal');
}

function saveNewPatient() {
  var name = document.getElementById('newPatientName').value.trim();
  var phone = document.getElementById('newPatientPhone').value.trim();
  var tag = document.getElementById('newPatientTag').value;

  if (!name) { showToast('请输入患者姓名', 'warning'); return; }
  if (!/^1\d{10}$/.test(phone)) { showToast('请输入正确的11位手机号', 'warning'); return; }

  var existing = state.allPatients.find(function(p) { return p.phone === phone; });
  if (existing) { showToast('该手机号已存在患者：' + existing.name, 'warning'); return; }

  var newPatient = { name: name, phone: phone, tag: tag };
  state.allPatients.unshift(newPatient);
  state.selectedPatient = newPatient;

  var savedPatients = state.allPatients.filter(function(p) {
    return !MOCK_PATIENTS.find(function(m) { return m.phone === p.phone; });
  });
  localStorage.setItem('dental_patients', JSON.stringify(savedPatients));

  var info = document.getElementById('patientInfo');
  document.getElementById('patientName').textContent = name;
  document.getElementById('patientPhone').textContent = phone.replace(/(\d{3})(\d{4})(\d{4})/, '$1****$3');
  document.getElementById('patientTag').textContent = tag;
  info.style.display = 'flex';

  var display = document.getElementById('patientDisplay');
  document.getElementById('patientDisplayName').textContent = '👤 ' + name + '  (' + tag + ')';
  document.getElementById('patientDisplaySub').textContent = '手机号：' + phone.replace(/(\d{3})(\d{4})(\d{4})/, '$1****$3');
  display.classList.add('show');

  closeModal('newPatientModal');
  showToast('患者已添加并选中', 'success');
}

function renderPackages() {
  var grid = document.getElementById('packageGrid');
  grid.innerHTML = PACKAGES.map(function(pkg) {
    return '<div class="pkg-card" data-id="' + pkg.id + '" onclick="selectPackage(\'' + pkg.id + '\')">' +
      '<div class="pkg-name" style="color:' + pkg.color + '">' + pkg.name + '</div>' +
      '<div class="pkg-items">' + pkg.items.map(function(item) { return '<span>' + item + '</span>'; }).join('') + '</div>' +
      '<div class="pkg-price-row">' +
        '<div class="pkg-price"><span class="yen">¥</span>' + pkg.price + '</div>' +
        '<div class="pkg-original">¥' + pkg.originalPrice + '</div>' +
      '</div>' +
      '<div class="pkg-target">' + pkg.target + '</div>' +
    '</div>';
  }).join('');
}

function selectPackage(id) {
  state.selectedPackage = PACKAGES.find(function(p) { return p.id === id; });
  state.addons = [];
  state.addonMeta = {};
  document.querySelectorAll('.pkg-card').forEach(function(c) {
    c.classList.toggle('selected', c.dataset.id === id);
  });
  renderOrder();
}

function renderOrder() {
  if (!state.selectedPackage) {
    document.getElementById('orderSection').style.display = 'none';
    return;
  }
  document.getElementById('orderSection').style.display = 'block';
  var tbody = document.getElementById('orderItems');
  var html = '';
  var pkg = state.selectedPackage;
  html += '<tr><td class="item-name">' + pkg.name + ' 套餐<span class="item-tag pkg">套餐</span></td>';
  html += '<td class="price-col"><span class="original-price">¥' + pkg.originalPrice + '</span></td>';
  html += '<td class="price-col" style="color:var(--danger)">¥' + pkg.price + '</td></tr>';

  pkg.items.forEach(function(item) {
    html += '<tr><td style="padding-left:28px;color:var(--text-secondary)">· ' + item + '</td>';
    html += '<td></td><td></td></tr>';
  });

  var addonsTotal = 0;
  state.addons.forEach(function(addonId) {
    var item = ADDON_ITEMS.find(function(a) { return a.id === addonId; });
    var meta = state.addonMeta[addonId];
    if (item) {
      addonsTotal += item.price;
      var doctor = meta ? DOCTOR_NAMES[meta.doctorSource] : '';
      html += '<tr class="addon-row"><td class="item-name">' + item.name + '<span class="item-tag addon">加项</span>';
      if (doctor) {
        html += '<div class="record-addon-detail">医生建议：' + doctor + '</div>';
      }
      html += '</td>';
      html += '<td class="price-col">¥' + item.price + '</td>';
      html += '<td class="price-col" style="color:var(--danger)">¥' + item.price + '</td></tr>';
    }
  });

  tbody.innerHTML = html;

  var total = pkg.price + addonsTotal;
  var saved = pkg.originalPrice - pkg.price;
  document.getElementById('totalAmount').innerHTML = '<span class="yen">¥</span>' + total.toFixed(0);
  document.getElementById('savedAmount').textContent = '已省¥' + saved;
}

function openAddonModal() {
  if (!state.selectedPackage) return;
  state.tempAddons = state.addons.slice();
  state.tempSigned = false;
  state.tempPatientConfirm = false;
  state.tempDoctorSource = '';

  var list = document.getElementById('addonList');
  list.innerHTML = ADDON_ITEMS.map(function(item) {
    var checked = state.tempAddons.indexOf(item.id) >= 0 ? ' checked' : '';
    return '<div class="addon-item' + checked + '" data-id="' + item.id + '" onclick="toggleTempAddon(this,\'' + item.id + '\')">' +
      '<div class="addon-check">' + (checked ? '✓' : '') + '</div>' +
      '<div class="addon-info"><div class="addon-name">' + item.name + '</div><div class="addon-desc">' + item.desc + '</div></div>' +
      '<div class="addon-price">¥' + item.price + '</div>' +
    '</div>';
  }).join('');
  document.getElementById('doctorSource').value = '';
  document.getElementById('patientConfirm').checked = false;
  state.signed = false;
  var signArea = document.getElementById('signArea');
  signArea.classList.remove('signed');
  var placeholder = signArea.firstChild;
  if (placeholder && placeholder.nodeType === 3) placeholder.textContent = '点击此处手写签名';
  clearSignCanvas();
  openModal('addonModal');
}

function toggleTempAddon(el, id) {
  var idx = state.tempAddons.indexOf(id);
  if (idx >= 0) {
    state.tempAddons.splice(idx, 1);
    el.classList.remove('checked');
    el.querySelector('.addon-check').textContent = '';
  } else {
    state.tempAddons.push(id);
    el.classList.add('checked');
    el.querySelector('.addon-check').textContent = '✓';
  }
}

function confirmAddons() {
  if (state.tempAddons.length === 0) {
    state.addons = [];
    state.addonMeta = {};
    renderOrder();
    closeModal('addonModal');
    return;
  }
  var doctor = document.getElementById('doctorSource').value;
  if (!doctor) { showToast('请选择医生建议来源', 'warning'); return; }
  if (!document.getElementById('patientConfirm').checked) { showToast('请确认患者已同意加项', 'warning'); return; }
  if (!state.signed) { showToast('请完成患者签字确认', 'warning'); return; }

  state.addons = state.tempAddons.slice();
  var meta = {
    doctorSource: doctor,
    patientConfirmed: true,
    patientSigned: true,
    confirmedAt: new Date().toLocaleString('zh-CN')
  };
  state.tempAddons.forEach(function(id) {
    state.addonMeta[id] = meta;
  });

  renderOrder();
  closeModal('addonModal');
  showToast('加项已确认并加入订单', 'success');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  if (id === 'addonModal') {
    state.tempAddons = [];
    state.tempSigned = false;
  }
}

var signCtx = null;
var isDrawing = false;

function startSign() {
  var canvas = document.getElementById('signCanvas');
  var area = document.getElementById('signArea');
  if (!signCtx) {
    canvas.width = area.offsetWidth;
    canvas.height = area.offsetHeight;
    signCtx = canvas.getContext('2d');
    signCtx.strokeStyle = '#303133';
    signCtx.lineWidth = 2;
    signCtx.lineCap = 'round';
    canvas.addEventListener('mousedown', function(e) {
      isDrawing = true;
      signCtx.beginPath();
      signCtx.moveTo(e.offsetX, e.offsetY);
    });
    canvas.addEventListener('mousemove', function(e) {
      if (!isDrawing) return;
      signCtx.lineTo(e.offsetX, e.offsetY);
      signCtx.stroke();
    });
    canvas.addEventListener('mouseup', function() {
      isDrawing = false;
      state.signed = true;
      area.classList.add('signed');
    });
    canvas.addEventListener('mouseleave', function() {
      isDrawing = false;
    });
  }
}

function clearSignCanvas() {
  var canvas = document.getElementById('signCanvas');
  if (canvas.width) {
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

function openPaymentModal() {
  if (!state.selectedPackage) return;
  if (!state.selectedPatient) { showToast('请先查询并选择患者', 'warning'); return; }
  state.payMethod = null;
  document.querySelectorAll('.pay-method').forEach(function(m) { m.classList.remove('selected'); });
  document.getElementById('selfPayMark').checked = false;
  document.getElementById('payRemark').value = '';
  document.getElementById('confirmPayBtn').disabled = true;
  var total = calcTotal();
  document.getElementById('payAmount').textContent = '¥' + total.toFixed(2);
  openModal('paymentModal');
}

function selectPayMethod(method) {
  state.payMethod = method;
  document.querySelectorAll('.pay-method').forEach(function(m) {
    m.classList.toggle('selected', m.dataset.method === method);
  });
  document.getElementById('confirmPayBtn').disabled = false;
}

function calcTotal() {
  var total = state.selectedPackage ? state.selectedPackage.price : 0;
  state.addons.forEach(function(id) {
    var item = ADDON_ITEMS.find(function(a) { return a.id === id; });
    if (item) total += item.price;
  });
  return total;
}

function confirmPayment() {
  if (!state.payMethod) { showToast('请选择支付方式', 'warning'); return; }
  var total = calcTotal();
  var now = new Date();

  var addonsWithMeta = state.addons.map(function(id) {
    var item = ADDON_ITEMS.find(function(a) { return a.id === id; });
    var meta = state.addonMeta[id] || {};
    return item ? {
      id: id,
      name: item.name,
      price: item.price,
      doctorSource: meta.doctorSource || '',
      patientConfirmed: meta.patientConfirmed || false,
      patientSigned: meta.patientSigned || false,
      confirmedAt: meta.confirmedAt || ''
    } : null;
  }).filter(Boolean);

  var record = {
    id: 'DJ' + now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + String(Math.floor(Math.random() * 9000) + 1000),
    patient: state.selectedPatient.name,
    patientPhone: state.selectedPatient.phone,
    patientTag: state.selectedPatient.tag,
    packageId: state.selectedPackage.id,
    packageName: state.selectedPackage.name,
    packageItems: state.selectedPackage.items.slice(),
    packageOriginalPrice: state.selectedPackage.originalPrice,
    packagePrice: state.selectedPackage.price,
    addons: addonsWithMeta,
    total: total,
    payMethod: state.payMethod,
    selfPay: document.getElementById('selfPayMark').checked,
    remark: document.getElementById('payRemark').value,
    time: now.toLocaleString('zh-CN'),
    status: 'normal',
    statusHistory: [{
      status: 'normal',
      time: now.toLocaleString('zh-CN'),
      reason: '正常收费'
    }],
    printHistory: [{
      printNo: 1,
      time: now.toLocaleString('zh-CN'),
      type: '首次打印'
    }]
  };
  state.records.unshift(record);
  localStorage.setItem('dental_records', JSON.stringify(state.records));
  closeModal('paymentModal');
  currentReceiptIdx = 0;
  showReceipt(record);
  resetCashier();
}

var currentReceiptIdx = -1;

function printAndRecord() {
  window.print();
  recordPrint();
}

function reprintReceipt() {
  recordPrint();
  window.print();
}

function recordPrint() {
  if (currentReceiptIdx < 0) return;
  var record = state.records[currentReceiptIdx];
  if (!record) return;
  if (!record.printHistory) record.printHistory = [];
  record.printHistory.push({
    printNo: record.printHistory.length + 1,
    time: new Date().toLocaleString('zh-CN'),
    type: record.printHistory.length === 0 ? '首次打印' : '补打'
  });
  localStorage.setItem('dental_records', JSON.stringify(state.records));
  showReceipt(record);
  showToast('打印记录已更新（第' + record.printHistory.length + '次）', 'success');
}

function showReceipt(record) {
  var methodNames = { cash: '现金', scan: '扫码支付', insurance: '医保' };
  var html = '';

  if (record.printHistory && record.printHistory.length > 0) {
    var lastPrint = record.printHistory[record.printHistory.length - 1];
    html += '<div class="receipt-print-info">';
    html += '<span class="print-badge">第' + lastPrint.printNo + '次打印</span> ';
    html += lastPrint.type + ' · ' + lastPrint.time;
    if (lastPrint.printNo > 1) {
      html += '<br>历史打印：';
      record.printHistory.forEach(function(p, i) {
        if (i > 0) html += '；';
        html += '第' + p.printNo + '次(' + p.type + ' ' + p.time + ')';
      });
    }
    html += '</div>';
  }

  if (record.status === 'voided') {
    html += '<div class="receipt-void-banner">⚠️ 此单据已作废</div>';
  } else if (record.status === 'refunded') {
    html += '<div class="receipt-void-banner">⚠️ 此单据已退款</div>';
  }

  html += '<div class="receipt-header">' +
    '<h4>🦷 洁牙抛光套餐收费凭证</h4>' +
    '<p>流水号：' + record.id + '</p>' +
  '</div>';
  html += '<div class="receipt-line"><span>患者</span><span>' + record.patient + ' (' + record.patientTag + ')</span></div>';
  html += '<div class="receipt-line"><span>手机号</span><span>' + record.patientPhone.replace(/(\d{3})(\d{4})(\d{4})/, '$1****$3') + '</span></div>';
  html += '<div class="receipt-line"><span>时间</span><span>' + record.time + '</span></div>';
  html += '<hr class="receipt-divider">';
  html += '<div class="receipt-section-title">✅ 洁牙抛光套餐已含项目</div>';
  record.packageItems.forEach(function(item) {
    html += '<div class="receipt-line"><span>· ' + item + '</span><span></span></div>';
  });
  html += '<div class="receipt-line"><span>' + record.packageName + '套餐</span><span>¥' + record.packagePrice + '</span></div>';
  if (record.addons.length > 0) {
    html += '<hr class="receipt-divider">';
    html += '<div class="receipt-section-title">➕ 加项（需医生建议+患者确认）</div>';
    record.addons.forEach(function(a) {
      html += '<div class="receipt-line"><span>' + a.name + '</span><span>¥' + a.price + '</span></div>';
      if (a.doctorSource) {
        html += '<div style="font-size:10px;color:var(--text-secondary);padding-left:12px">建议医生：' + DOCTOR_NAMES[a.doctorSource] + '</div>';
      }
      if (a.patientConfirmed && a.patientSigned) {
        html += '<div style="font-size:10px;color:var(--success);padding-left:12px">✓ 患者知情同意并签字确认</div>';
      }
    });
  }
  html += '<hr class="receipt-divider">';
  html += '<div class="receipt-line receipt-total"><span>合计</span><span>¥' + record.total.toFixed(2) + '</span></div>';
  html += '<div class="receipt-line"><span>支付方式</span><span>' + (methodNames[record.payMethod] || record.payMethod) + '</span></div>';
  if (record.selfPay) {
    html += '<div class="receipt-line" style="color:var(--danger)"><span>医保外自费</span><span>是</span></div>';
  }
  if (record.remark) {
    html += '<div class="receipt-line"><span>备注</span><span>' + record.remark + '</span></div>';
  }

  if (record.status !== 'normal' && record.statusHistory) {
    html += '<hr class="receipt-divider">';
    record.statusHistory.forEach(function(h) {
      if (h.status !== 'normal') {
        var statusText = h.status === 'voided' ? '已作废' : '已退款';
        html += '<div style="font-size:11px;color:var(--danger)">' + statusText + '：' + h.time + '</div>';
        html += '<div style="font-size:11px;color:var(--text-secondary);padding-left:12px">原因：' + h.reason + '</div>';
      }
    });
  }

  html += '<div class="receipt-footer">此凭证为收费依据，请妥善保管<br>如有疑问请联系前台</div>';
  document.getElementById('receiptContent').innerHTML = html;
  openModal('receiptModal');
}

function resetCashier() {
  state.selectedPackage = null;
  state.addons = [];
  state.addonMeta = {};
  document.querySelectorAll('.pkg-card').forEach(function(c) { c.classList.remove('selected'); });
  document.getElementById('orderSection').style.display = 'none';
}

var currentFilters = {
  patient: '',
  phone: '',
  date: '',
  method: '',
  status: ''
};

function applyFilters() {
  currentFilters.patient = document.getElementById('filterPatient').value.trim();
  currentFilters.phone = document.getElementById('filterPhone').value.trim();
  currentFilters.date = document.getElementById('filterDate').value;
  currentFilters.method = document.getElementById('filterMethod').value;
  currentFilters.status = document.getElementById('filterStatus').value;
  renderRecords();
}

function extractDateStr(timeStr) {
  if (!timeStr) return '';
  var m = timeStr.match(/(\d{4})[/\-.年](\d{1,2})[/\-.月](\d{1,2})/);
  if (m) return m[1] + '-' + String(m[2]).padStart(2, '0') + '-' + String(m[3]).padStart(2, '0');
  return '';
}

function resetFilters() {
  document.getElementById('filterPatient').value = '';
  document.getElementById('filterPhone').value = '';
  document.getElementById('filterDate').value = '';
  document.getElementById('filterMethod').value = '';
  document.getElementById('filterStatus').value = '';
  currentFilters = { patient: '', phone: '', date: '', method: '', status: '' };
  renderRecords();
}

var currentVoidRecordIndex = -1;
var currentVoidType = 'voided';

function openVoidModal(idx, type) {
  var record = state.records[idx];
  if (!record || record.status !== 'normal') {
    showToast('该记录状态不允许此操作', 'warning');
    return;
  }
  currentVoidRecordIndex = idx;
  currentVoidType = type;
  document.getElementById('voidModalTitle').textContent = type === 'voided' ? '作废记录' : '退款记录';
  document.getElementById('voidReasonLabel').textContent = type === 'voided' ? '作废原因' : '退款原因';
  document.getElementById('confirmVoidBtn').textContent = type === 'voided' ? '确认作废' : '确认退款';
  document.getElementById('confirmVoidBtn').className = type === 'voided' ? 'btn btn-danger' : 'btn btn-warning';
  document.getElementById('voidRecordId').textContent = record.id;
  document.getElementById('voidRecordPatient').textContent = record.patient;
  document.getElementById('voidRecordAmount').textContent = record.total.toFixed(2);
  document.getElementById('voidReason').value = '';
  openModal('voidModal');
}

function confirmVoid() {
  var reason = document.getElementById('voidReason').value.trim();
  if (!reason) { showToast('请填写原因', 'warning'); return; }
  if (reason.length < 5) { showToast('原因请至少填写5个字', 'warning'); return; }

  var record = state.records[currentVoidRecordIndex];
  record.status = currentVoidType;
  record.statusHistory.push({
    status: currentVoidType,
    time: new Date().toLocaleString('zh-CN'),
    reason: reason
  });

  localStorage.setItem('dental_records', JSON.stringify(state.records));
  closeModal('voidModal');
  renderRecords();
  var actionText = currentVoidType === 'voided' ? '作废' : '退款';
  showToast('记录已' + actionText, 'success');
}

function renderRecords() {
  var tbody = document.getElementById('recordBody');
  var empty = document.getElementById('emptyRecords');

  var filtered = state.records.filter(function(r) {
    if (currentFilters.patient && !r.patient.includes(currentFilters.patient)) return false;
    if (currentFilters.phone && !r.patientPhone.includes(currentFilters.phone)) return false;
    if (currentFilters.date) {
      var recDate = extractDateStr(r.time);
      if (recDate !== currentFilters.date) return false;
    }
    if (currentFilters.method && r.payMethod !== currentFilters.method) return false;
    if (currentFilters.status && r.status !== currentFilters.status) return false;
    return true;
  });

  renderReconPanel(filtered);

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    empty.querySelector('p').textContent = state.records.length === 0 ? '暂无收费记录' : '没有符合筛选条件的记录';
    return;
  }
  empty.style.display = 'none';
  var methodNames = { cash: '现金', scan: '扫码', insurance: '医保' };
  var statusNames = { normal: '正常', voided: '已作废', refunded: '已退款' };
  var statusBadges = { normal: 'badge-success', voided: 'badge-danger', refunded: 'badge-warning' };

  tbody.innerHTML = filtered.map(function(r) {
    var actualIdx = state.records.indexOf(r);
    var methodBadge = r.payMethod === 'cash' ? 'badge-success' : r.payMethod === 'scan' ? 'badge-primary' : 'badge-warning';
    var addonsHtml = r.addons.map(function(a) { return a.name; }).join('、') || '-';
    return '<tr>' +
      '<td>' + r.id + '</td>' +
      '<td>' + r.patient + '<div class="record-addon-detail">' + r.patientPhone.replace(/(\d{3})(\d{4})(\d{4})/, '$1****$3') + '</div></td>' +
      '<td>' + r.packageName + (r.addons.length > 0 ? '<div class="record-addon-detail">加项：' + addonsHtml + '</div>' : '') + '</td>' +
      '<td style="font-weight:700;color:var(--danger)">¥' + r.total.toFixed(0) + '</td>' +
      '<td><span class="badge ' + methodBadge + '">' + (methodNames[r.payMethod] || r.payMethod) + '</span></td>' +
      '<td><span class="badge ' + statusBadges[r.status] + '">' + statusNames[r.status] + '</span></td>' +
      '<td style="color:var(--text-secondary);font-size:12px">' + r.time + '</td>' +
      '<td>' +
        '<button class="btn btn-sm btn-outline" onclick="viewReceipt(' + actualIdx + ')" style="margin-right:4px">小票</button>' +
        (r.status === 'normal' ? '<button class="btn btn-sm btn-warning" onclick="openVoidModal(' + actualIdx + ', \'refunded\')" style="margin-right:4px">退款</button>' : '') +
        (r.status === 'normal' ? '<button class="btn btn-sm btn-danger" onclick="openVoidModal(' + actualIdx + ', \'voided\')">作废</button>' : '') +
      '</td>' +
    '</tr>';
  }).join('');
}

function viewReceipt(idx) {
  currentReceiptIdx = idx;
  showReceipt(state.records[idx]);
}

function renderReconPanel(filtered) {
  var today = new Date();
  var todayStr = today.getFullYear() + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + String(today.getDate()).padStart(2, '0');
  document.getElementById('reconDate').textContent = '统计日期：' + todayStr;

  var methods = ['cash', 'scan', 'insurance'];
  var methodLabels = { cash: '现金', scan: '扫码', insurance: '医保' };
  var methodClasses = { cash: 'cash', scan: 'scan', insurance: 'insurance' };

  var stats = {};
  methods.forEach(function(m) {
    stats[m] = { count: 0, total: 0, voidCount: 0, voidAmount: 0, refundCount: 0, refundAmount: 0 };
  });

  var totalGross = 0;
  var totalVoid = 0;
  var totalRefund = 0;

  filtered.forEach(function(r) {
    var s = stats[r.payMethod];
    if (!s) return;
    if (r.status === 'normal') {
      s.count++;
      s.total += r.total;
      totalGross += r.total;
    } else if (r.status === 'voided') {
      s.voidCount++;
      s.voidAmount += r.total;
      totalVoid += r.total;
    } else if (r.status === 'refunded') {
      s.refundCount++;
      s.refundAmount += r.total;
      totalRefund += r.total;
    }
  });

  var cardsHtml = methods.map(function(m) {
    var s = stats[m];
    return '<div class="recon-card ' + methodClasses[m] + '">' +
      '<div class="recon-label">' + methodLabels[m] + '</div>' +
      '<div class="recon-count">' + s.count + ' 笔</div>' +
      '<div class="recon-amount"><span class="yen">¥</span>' + s.total.toFixed(2) + '</div>' +
      (s.voidCount > 0 ? '<div style="font-size:11px;color:var(--danger);margin-top:2px">作废' + s.voidCount + '笔 -¥' + s.voidAmount.toFixed(2) + '</div>' : '') +
      (s.refundCount > 0 ? '<div style="font-size:11px;color:var(--warning);margin-top:2px">退款' + s.refundCount + '笔 -¥' + s.refundAmount.toFixed(2) + '</div>' : '') +
    '</div>';
  }).join('');
  document.getElementById('reconCards').innerHTML = cardsHtml;

  var net = totalGross - totalVoid - totalRefund;
  var netDetail = '总收费' + filtered.filter(function(r) { return r.status === 'normal'; }).length + '笔 ¥' + totalGross.toFixed(2);
  if (totalVoid > 0) netDetail += ' · 作废' + filtered.filter(function(r) { return r.status === 'voided'; }).length + '笔 -¥' + totalVoid.toFixed(2);
  if (totalRefund > 0) netDetail += ' · 退款' + filtered.filter(function(r) { return r.status === 'refunded'; }).length + '笔 -¥' + totalRefund.toFixed(2);

  document.getElementById('reconNet').innerHTML =
    '<div><div class="recon-net-label">净收款</div><div class="recon-net-detail">' + netDetail + '</div></div>' +
    '<div class="recon-net-amount"><span class="yen">¥</span>' + net.toFixed(2) + '</div>';
}

function exportRecords() {
  var filtered = state.records.filter(function(r) {
    if (currentFilters.patient && !r.patient.includes(currentFilters.patient)) return false;
    if (currentFilters.phone && !r.patientPhone.includes(currentFilters.phone)) return false;
    if (currentFilters.date) {
      var recDate = extractDateStr(r.time);
      if (recDate !== currentFilters.date) return false;
    }
    if (currentFilters.method && r.payMethod !== currentFilters.method) return false;
    if (currentFilters.status && r.status !== currentFilters.status) return false;
    return true;
  });

  if (filtered.length === 0) { showToast('没有可导出的记录', 'warning'); return; }

  var methodNames = { cash: '现金', scan: '扫码', insurance: '医保' };
  var statusNames = { normal: '正常', voided: '已作废', refunded: '已退款' };

  var headers = ['流水号', '患者姓名', '手机号', '套餐', '套餐价格', '加项', '加项金额', '总金额', '支付方式', '医保外自费', '状态', '作废/退款原因', '收费时间', '备注'];
  var rows = filtered.map(function(r) {
    var addons = r.addons.map(function(a) { return a.name; }).join('+');
    var addonPrices = r.addons.map(function(a) { return a.price; }).join('+');
    var reason = '';
    if (r.statusHistory) {
      r.statusHistory.forEach(function(h) {
        if (h.status !== 'normal') reason += (reason ? '；' : '') + h.reason;
      });
    }
    return [
      r.id,
      r.patient,
      r.patientPhone,
      r.packageName,
      r.packagePrice,
      addons || '',
      addonPrices || '',
      r.total.toFixed(2),
      methodNames[r.payMethod] || r.payMethod,
      r.selfPay ? '是' : '否',
      statusNames[r.status] || r.status,
      reason,
      r.time,
      r.remark || ''
    ];
  });

  var BOM = '\uFEFF';
  var csvContent = BOM + headers.map(function(h) { return '"' + h + '"'; }).join(',') + '\n';
  rows.forEach(function(row) {
    csvContent += row.map(function(cell) { return '"' + String(cell).replace(/"/g, '""') + '"'; }).join(',') + '\n';
  });

  var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var link = document.createElement('a');
  var dateLabel = currentFilters.date || new Date().toISOString().slice(0, 10);
  link.href = url;
  link.download = '洁牙收费流水_' + dateLabel + '.csv';
  link.click();
  URL.revokeObjectURL(url);
  showToast('已导出' + filtered.length + '条记录', 'success');
}

function openModal(id) {
  document.getElementById(id).classList.add('show');
}

var toastTimer = null;
function showToast(msg, type) {
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  clearTimeout(toastTimer);
  var colors = { success: 'var(--success)', warning: 'var(--warning)', error: 'var(--danger)' };
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;top:72px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:6px;color:#fff;font-size:14px;font-weight:600;z-index:999;background:' + (colors[type] || colors.success) + ';box-shadow:0 4px 12px rgba(0,0,0,.15);animation:modalIn .25s ease';
  document.body.appendChild(toast);
  toastTimer = setTimeout(function() { toast.remove(); }, 2500);
}

renderPackages();
